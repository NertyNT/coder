name: Auto Beta Release

on:
  push:
    branches:
      - main
      - work

permissions:
  contents: write

jobs:
  beta-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build beta tag
        id: vars
        run: |
          BASE_VERSION="0.1.0"
          TAG="v${BASE_VERSION}-beta.${GITHUB_RUN_NUMBER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp client_beta1.py client_gui_beta1.py server_beta1.py dist/
          (cd dist && zip -r python-beta-files.zip client_beta1.py client_gui_beta1.py server_beta1.py)

      - name: Create release notes body
        run: |
          {
            echo "## Что добавлено в этом beta-релизе"
            echo
            git log -1 --pretty=format:"- %s" || true
            echo
            echo "## Вложенные файлы"
            echo "- client_beta1.py"
            echo "- client_gui_beta1.py"
            echo "- server_beta1.py"
            echo "- python-beta-files.zip"
          } > RELEASE_BODY.md

      - name: Create and push tag
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto beta release $TAG"
          git push origin "$TAG"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          prerelease: true
          body_path: RELEASE_BODY.md
          files: |
            dist/client_beta1.py
            dist/client_gui_beta1.py
            dist/server_beta1.py
            dist/python-beta-files.zip
